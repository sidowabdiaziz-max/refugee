version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: rdi
      POSTGRES_PASSWORD: rdi_secure
      POSTGRES_DB: rdi
    ports: ['5432:5432']
  redis:
    image: redis:7
    ports: ['6379:6379']

  identity-service:
    build: ./services/identity-service
    ports: ['8001:8000']
  ngo-service:
    build: ./services/ngo-service
    ports: ['8002:8000']
  service-catalog-service:
    build: ./services/service-catalog-service
    ports: ['8003:8000']
  ai-service:
    build: ./services/ai-service
    ports: ['8004:8000']

  pwa:
    image: nginx:alpine
    volumes:
      - ./apps/refugee-digital-identity-pwa:/usr/share/nginx/html:ro
    ports: ['8080:80']
