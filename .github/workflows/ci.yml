name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install service deps
        run: |
          npm install --prefix services/identity-service
          npm install --prefix services/ngo-service
          npm install --prefix services/service-catalog-service
          npm install --prefix services/ai-service
      - name: Run tests
        run: npm test
